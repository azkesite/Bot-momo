services:
  postgres:
    image: postgres:16-alpine
    container_name: bot-momo-postgres
    environment:
      POSTGRES_DB: bot_momo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bot_momo']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bot-momo-redis
    ports:
      - '6379:6379'

volumes:
  postgres-data:

